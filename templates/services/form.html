<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="/services" class="text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-slate-900">{{.title}}</h1>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
        <form action="/services{{if .service}}/{{.service.ID}}{{end}}" method="POST" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Nama Layanan <span class="text-red-500">*</span></label>
                    <input type="text" id="name" name="name" required
                        value="{{if .service}}{{.service.Name}}{{end}}"
                        placeholder="Cuci + Setrika"
                        class="w-full px-4 py-2.5 rounded-lg border {{if index .errors `Name`}}border-red-400 focus:ring-red-500{{else}}border-slate-300 focus:ring-indigo-500{{end}} focus:border-indigo-500 outline-none transition">
                    {{if index .errors "Name"}}<p class="text-xs text-red-500 mt-1">{{index .errors "Name"}}</p>{{end}}
                </div>

                <div>
                    <label for="price_per_kg" class="block text-sm font-medium text-slate-700 mb-1">Harga per Kg <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">Rp</span>
                        <input type="number" id="price_per_kg" name="price_per_kg" required min="0" step="1000"
                            value="{{if .service}}{{printf "%.0f" .service.PricePerKg}}{{end}}"
                            placeholder="10000"
                            class="w-full pl-10 pr-4 py-2.5 rounded-lg border {{if index .errors `PricePerKg`}}border-red-400 focus:ring-red-500{{else}}border-slate-300 focus:ring-indigo-500{{end}} focus:border-indigo-500 outline-none transition">
                    </div>
                    {{if index .errors "PricePerKg"}}<p class="text-xs text-red-500 mt-1">{{index .errors "PricePerKg"}}</p>{{end}}
                </div>

                <div>
                    <label for="estimated_hours" class="block text-sm font-medium text-slate-700 mb-1">Estimasi (Jam) <span class="text-red-500">*</span></label>
                    <input type="number" id="estimated_hours" name="estimated_hours" required min="1"
                        value="{{if .service}}{{.service.EstimatedHours}}{{else}}24{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <div class="md:col-span-2">
                    <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Deskripsi</label>
                    <textarea id="description" name="description" rows="2"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">{{if .service}}{{.service.Description}}{{end}}</textarea>
                </div>

                <div class="md:col-span-2">
                    <label class="inline-flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" name="is_active" class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" {{if or (not .service) .service.IsActive}}checked{{end}}>
                        <span class="text-sm text-slate-700">Layanan aktif</span>
                    </label>
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    {{if .service}}Simpan Perubahan{{else}}Simpan{{end}}
                </button>
                <a href="/services" class="text-sm text-slate-500 hover:text-slate-700 transition">Batal</a>
            </div>
        </form>
    </div>
</div>
