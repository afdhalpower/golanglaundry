<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="/expenses" class="text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-slate-900">{{.title}}</h1>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
        <form action="/expenses{{if .expense}}/{{.expense.ID}}{{end}}" method="POST" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label for="expense_category_id" class="block text-sm font-medium text-slate-700 mb-1">Kategori <span class="text-red-500">*</span></label>
                    <select id="expense_category_id" name="expense_category_id" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition text-sm">
                        <option value="">Pilih kategori...</option>
                        {{range .categories}}
                        <option value="{{.ID}}" {{if and $.expense (eq $.expense.ExpenseCategoryID .ID)}}selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                <div>
                    <label for="date" class="block text-sm font-medium text-slate-700 mb-1">Tanggal</label>
                    <input type="date" id="date" name="date"
                        value="{{if .expense}}{{.expense.Date.Format "2006-01-02"}}{{else}}{{nowDate}}{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="amount" class="block text-sm font-medium text-slate-700 mb-1">Jumlah <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">Rp</span>
                        <input type="number" id="amount" name="amount" required min="0"
                            value="{{if .expense}}{{printf "%.0f" .expense.Amount}}{{end}}"
                            class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                </div>
                <div></div>
                <div class="md:col-span-2">
                    <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Keterangan</label>
                    <textarea id="description" name="description" rows="2"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">{{if .expense}}{{.expense.Description}}{{end}}</textarea>
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition">
                    {{if .expense}}Simpan Perubahan{{else}}Simpan{{end}}
                </button>
                <a href="/expenses" class="text-sm text-slate-500 hover:text-slate-700 transition">Batal</a>
            </div>
        </form>
    </div>
</div>
