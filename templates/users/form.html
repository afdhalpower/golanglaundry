<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="/users" class="text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-slate-900">{{.title}}</h1>
        </div>
    </div>

    {{if .user}}
    <!-- Reset Password Section -->
    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm mb-6">
        <h3 class="text-sm font-semibold text-slate-900 mb-4">Reset Password</h3>
        <form action="/users/{{.user.ID}}/reset-password" method="POST" class="flex items-center gap-3">
            <input type="password" name="password" placeholder="Password baru (min 6 karakter)" required minlength="6"
                class="flex-1 px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            <button type="submit" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition">Reset</button>
        </form>
    </div>
    {{end}}

    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
        <form action="/users{{if .user}}/{{.user.ID}}{{end}}" method="POST" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Nama <span class="text-red-500">*</span></label>
                    <input type="text" id="name" name="name" required
                        value="{{if .user}}{{.user.Name}}{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email <span class="text-red-500">*</span></label>
                    <input type="email" id="email" name="email" required
                        value="{{if .user}}{{.user.Email}}{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="role" class="block text-sm font-medium text-slate-700 mb-1">Role <span class="text-red-500">*</span></label>
                    <select id="role" name="role" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                        <option value="">Pilih role...</option>
                        {{range .roles}}
                        <option value="{{.}}" {{if and $.user (eq $.user.Role .)}}selected{{end}}>
                            {{if eq . "admin"}}Administrator
                            {{else if eq . "kasir"}}Kasir
                            {{else if eq . "pegawai"}}Pegawai
                            {{else}}{{.}}{{end}}
                        </option>
                        {{end}}
                    </select>
                </div>
                {{if not .user}}
                <div class="md:col-span-2">
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password <span class="text-red-500">*</span></label>
                    <input type="password" id="password" name="password" required minlength="6"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                {{end}}
                {{if .user}}
                <div class="md:col-span-2">
                    <label class="inline-flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" name="is_active" class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" {{if .user.IsActive}}checked{{end}}>
                        <span class="text-sm text-slate-700">Akun aktif</span>
                    </label>
                </div>
                {{end}}
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition">
                    {{if .user}}Simpan Perubahan{{else}}Simpan{{end}}
                </button>
                <a href="/users" class="text-sm text-slate-500 hover:text-slate-700 transition">Batal</a>
            </div>
        </form>
    </div>
</div>
