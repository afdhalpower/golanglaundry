<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="/customers" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-200 transition" title="Kembali">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-slate-900">{{.title}}</h1>
            <p class="text-sm text-slate-500 mt-0.5">Masukkan data pelanggan laundry</p>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm"
         x-data="{ loading: false, dirty: false, name: '{{if .customer}}{{.customer.Name}}{{end}}', phone: '{{if .customer}}{{.customer.Phone}}{{end}}', whatsapp: '{{if .customer}}{{.customer.Whatsapp}}{{end}}', address: '{{if .customer}}{{.customer.Address}}{{end}}', notes: '{{if .customer}}{{.customer.Notes}}{{end}}' }">
        {{if .error}}
        <div class="mb-5 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3">
            <svg class="w-5 h-5 text-red-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="text-sm text-red-700">{{.error}}</p>
        </div>
        {{end}}

        <form action="/customers{{if .customer}}/{{.customer.ID}}{{end}}" method="POST" class="space-y-5"
              @submit="loading = true"
              x-on:formdata-change="dirty = true">
            {{if .customer}}<input type="hidden" name="_method" value="PUT">{{end}}

            <!-- Nama -->
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Nama Lengkap <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <input type="text" id="name" name="name" required autofocus
                           value="{{if .customer}}{{.customer.Name}}{{end}}"
                           x-model="name"
                           placeholder="cth: Budi Santoso"
                           class="w-full pl-10 pr-4 py-2.5 rounded-lg border {{if index .errors `Name`}}border-red-400 focus:ring-red-500 focus:border-red-500{{else}}border-slate-300 focus:ring-indigo-500 focus:border-indigo-500{{end}} outline-none transition text-sm">
                </div>
                {{if index .errors "Name"}}<p class="text-xs text-red-500 mt-1.5 flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>{{index .errors "Name"}}</p>{{end}}
            </div>

            <!-- Phone & WhatsApp -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label for="phone" class="block text-sm font-medium text-slate-700 mb-1.5">Nomor HP</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </div>
                        <input type="tel" id="phone" name="phone"
                               value="{{if .customer}}{{.customer.Phone}}{{end}}"
                               x-model="phone"
                               placeholder="08123456789"
                               class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm">
                    </div>
                </div>

                <div>
                    <label for="whatsapp" class="block text-sm font-medium text-slate-700 mb-1.5">
                        WhatsApp
                        <span class="text-xs text-slate-400 font-normal">(dengan kode negara)</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        </div>
                        <input type="tel" id="whatsapp" name="whatsapp"
                               value="{{if .customer}}{{.customer.Whatsapp}}{{end}}"
                               x-model="whatsapp"
                               placeholder="628123456789"
                               class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm">
                    </div>
                    <p class="text-xs text-slate-400 mt-1">Contoh: 628123456789 (tanpa +)</p>
                </div>
            </div>

            <!-- Alamat -->
            <div>
                <label for="address" class="block text-sm font-medium text-slate-700 mb-1.5">Alamat</label>
                <div class="relative">
                    <div class="absolute top-3 left-3.5 flex items-start pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <textarea id="address" name="address" rows="2"
                              x-model="address"
                              placeholder="Jl. Merdeka No. 1, Kecamatan..."
                              class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm">{{if .customer}}{{.customer.Address}}{{end}}</textarea>
                </div>
            </div>

            <!-- Catatan -->
            <div>
                <label for="notes" class="block text-sm font-medium text-slate-700 mb-1.5">Catatan</label>
                <div class="relative">
                    <div class="absolute top-3 left-3.5 flex items-start pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </div>
                    <textarea id="notes" name="notes" rows="2"
                              x-model="notes"
                              placeholder="Catatan khusus pelanggan (opsional)..."
                              class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm">{{if .customer}}{{.customer.Notes}}{{end}}</textarea>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-between pt-2 border-t border-slate-100">
                <a href="/customers" class="text-sm text-slate-500 hover:text-slate-700 transition flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-slate-50">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Kembali
                </a>
                <div class="flex items-center gap-3">
                    <a href="/customers" class="text-sm text-slate-500 hover:text-slate-700 transition px-4 py-2 rounded-lg hover:bg-slate-50">Batal</a>
                    <button type="submit"
                            :disabled="loading"
                            class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 disabled:cursor-not-allowed text-white px-6 py-2.5 rounded-lg text-sm font-medium transition focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 inline-flex items-center gap-2">
                        <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="loading ? 'Menyimpan...' : '{{if .customer}}Simpan Perubahan{{else}}Simpan{{end}}'"></span>
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
