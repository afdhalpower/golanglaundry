<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="/customers" class="text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-slate-900">{{.title}}</h1>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
        <form action="/customers{{if .customer}}/{{.customer.ID}}{{end}}" method="POST" class="space-y-5">
            {{if .customer}}<input type="hidden" name="_method" value="PUT">{{end}}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Nama <span class="text-red-500">*</span></label>
                    <input type="text" id="name" name="name" required
                        value="{{if .customer}}{{.customer.Name}}{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border {{if index .errors `Name`}}border-red-400 focus:ring-red-500{{else}}border-slate-300 focus:ring-indigo-500{{end}} focus:border-indigo-500 outline-none transition">
                    {{if index .errors "Name"}}<p class="text-xs text-red-500 mt-1">{{index .errors "Name"}}</p>{{end}}
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-slate-700 mb-1">Nomor HP</label>
                    <input type="tel" id="phone" name="phone"
                        value="{{if .customer}}{{.customer.Phone}}{{end}}"
                        placeholder="08123456789"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <div>
                    <label for="whatsapp" class="block text-sm font-medium text-slate-700 mb-1">WhatsApp</label>
                    <input type="tel" id="whatsapp" name="whatsapp"
                        value="{{if .customer}}{{.customer.Whatsapp}}{{end}}"
                        placeholder="628123456789"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <div class="md:col-span-2">
                    <label for="address" class="block text-sm font-medium text-slate-700 mb-1">Alamat</label>
                    <textarea id="address" name="address" rows="2"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">{{if .customer}}{{.customer.Address}}{{end}}</textarea>
                </div>

                <div class="md:col-span-2">
                    <label for="notes" class="block text-sm font-medium text-slate-700 mb-1">Catatan</label>
                    <textarea id="notes" name="notes" rows="2"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">{{if .customer}}{{.customer.Notes}}{{end}}</textarea>
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    {{if .customer}}Simpan Perubahan{{else}}Simpan{{end}}
                </button>
                <a href="/customers" class="text-sm text-slate-500 hover:text-slate-700 transition">Batal</a>
            </div>
        </form>
    </div>
</div>
