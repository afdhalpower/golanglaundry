<script>
    document.addEventListener('alpine:init', function () {
        Alpine.store('toast', {
            show: false,
            message: '',
            type: 'success',
            timeout: null,
            showToast(message, type) {
                if (type === undefined) type = 'success';
                this.show = true;
                this.message = message;
                this.type = type;
                clearTimeout(this.timeout);
                this.timeout = setTimeout(function () {
                    this.show = false;
                }.bind(this), 3000);
            },
            hide() {
                this.show = false;
                clearTimeout(this.timeout);
            }
        });
    });
</script>

<div x-data
     x-show="$store.toast.show"
     x-cloak
     x-transition:enter="transition transform ease-out duration-300"
     x-transition:enter-start="translate-x-full opacity-0"
     x-transition:enter-end="translate-x-0 opacity-100"
     x-transition:leave="transition transform ease-in duration-200"
     x-transition:leave-start="translate-x-0 opacity-100"
     x-transition:leave-end="translate-x-full opacity-0"
     class="fixed top-4 right-4 z-[100] max-w-sm w-full pointer-events-auto"
     role="alert">
    <div class="rounded-xl shadow-lg border overflow-hidden"
         :class="{
             'bg-emerald-50 border-emerald-200': $store.toast.type === 'success',
             'bg-red-50 border-red-200': $store.toast.type === 'error'
         }">
        <div class="flex items-center gap-3 p-4">
            <!-- Success Icon -->
            <template x-if="$store.toast.type === 'success'">
                <div class="w-8 h-8 bg-emerald-100 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
            </template>
            <!-- Error Icon -->
            <template x-if="$store.toast.type === 'error'">
                <div class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </div>
            </template>
            <p class="text-sm font-medium flex-1"
               :class="{
                   'text-emerald-800': $store.toast.type === 'success',
                   'text-red-800': $store.toast.type === 'error'
               }"
               x-text="$store.toast.message">
            </p>
            <button @click="$store.toast.hide()"
                    class="flex-shrink-0 p-1 rounded-lg hover:bg-black/5 transition-colors">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
    </div>
</div>
