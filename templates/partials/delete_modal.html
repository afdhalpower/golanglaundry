<div x-show="modal"
     x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center"
     role="dialog"
     aria-modal="true">
    <!-- Backdrop with blur -->
    <div x-show="modal"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm"
         @click="modal = false">
    </div>

    <!-- Modal Panel -->
    <div x-show="modal"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4"
         class="relative bg-white rounded-2xl shadow-xl max-w-md w-full mx-4 p-6"
         @click.away="modal = false">
        <!-- Warning Icon -->
        <div class="mx-auto w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-4">
            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
        </div>

        <h3 class="text-lg font-semibold text-slate-900 text-center mb-2">Konfirmasi Hapus</h3>
        <p class="text-sm text-slate-500 text-center mb-6">
            Apakah Anda yakin ingin menghapus <span class="font-semibold text-slate-700" x-text="itemName"></span>?
        </p>

        <div class="flex gap-3">
            <button type="button"
                    @click="modal = false"
                    class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                Batal
            </button>
            <form :action="action" method="POST" class="flex-1">
                <button type="submit"
                        class="w-full px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition-colors">
                    Ya, Hapus
                </button>
            </form>
        </div>
    </div>
</div>
