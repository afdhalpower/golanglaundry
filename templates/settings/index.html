<div class="max-w-2xl mx-auto">
    <div>
        <h1 class="text-2xl font-bold text-slate-900">Pengaturan</h1>
        <p class="text-sm text-slate-500 mt-1">Profil dan informasi laundry</p>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm mt-6">
        <form action="/settings" method="POST" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label for="laundry_name" class="block text-sm font-medium text-slate-700 mb-1">Nama Laundry</label>
                    <input type="text" id="laundry_name" name="laundry_name"
                        value="{{index .settings "laundry_name"}}"
                        placeholder="Nama laundry Anda"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div class="md:col-span-2">
                    <label for="laundry_address" class="block text-sm font-medium text-slate-700 mb-1">Alamat</label>
                    <textarea id="laundry_address" name="laundry_address" rows="2"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">{{index .settings "laundry_address"}}</textarea>
                </div>
                <div>
                    <label for="laundry_phone" class="block text-sm font-medium text-slate-700 mb-1">Nomor Telepon</label>
                    <input type="text" id="laundry_phone" name="laundry_phone"
                        value="{{index .settings "laundry_phone"}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="laundry_whatsapp" class="block text-sm font-medium text-slate-700 mb-1">WhatsApp</label>
                    <input type="text" id="laundry_whatsapp" name="laundry_whatsapp"
                        value="{{index .settings "laundry_whatsapp"}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="laundry_open" class="block text-sm font-medium text-slate-700 mb-1">Jam Operasional</label>
                    <input type="text" id="laundry_open" name="laundry_open"
                        value="{{index .settings "laundry_open"}}"
                        placeholder="08:00 - 21:00"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition">
                    Simpan Pengaturan
                </button>
            </div>
        </form>
    </div>
</div>
