<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="/inventory" class="text-slate-400 hover:text-slate-600 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-slate-900">{{.title}}</h1>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
        <form action="/inventory{{if .item}}/{{.item.ID}}{{end}}" method="POST" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Nama Barang <span class="text-red-500">*</span></label>
                    <input type="text" id="name" name="name" required
                        value="{{if .item}}{{.item.Name}}{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="category" class="block text-sm font-medium text-slate-700 mb-1">Kategori <span class="text-red-500">*</span></label>
                    <select id="category" name="category" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                        <option value="">Pilih kategori...</option>
                        <option value="Sabun" {{if and .item (eq .item.Category "Sabun")}}selected{{end}}>Sabun</option>
                        <option value="Pewangi" {{if and .item (eq .item.Category "Pewangi")}}selected{{end}}>Pewangi</option>
                        <option value="Plastik" {{if and .item (eq .item.Category "Plastik")}}selected{{end}}>Plastik</option>
                        <option value="Hanger" {{if and .item (eq .item.Category "Hanger")}}selected{{end}}>Hanger</option>
                        <option value="Nota" {{if and .item (eq .item.Category "Nota")}}selected{{end}}>Nota</option>
                        <option value="Lainnya" {{if and .item (eq .item.Category "Lainnya")}}selected{{end}}>Lainnya</option>
                    </select>
                </div>
                <div>
                    <label for="unit" class="block text-sm font-medium text-slate-700 mb-1">Satuan</label>
                    <input type="text" id="unit" name="unit"
                        value="{{if .item}}{{.item.Unit}}{{else}}pcs{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="stock" class="block text-sm font-medium text-slate-700 mb-1">Stok Saat Ini</label>
                    <input type="number" id="stock" name="stock" min="0"
                        value="{{if .item}}{{.item.Stock}}{{else}}0{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="min_stock" class="block text-sm font-medium text-slate-700 mb-1">Stok Minimum</label>
                    <input type="number" id="min_stock" name="min_stock" min="0"
                        value="{{if .item}}{{.item.MinStock}}{{else}}0{{end}}"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    <p class="text-xs text-slate-400 mt-1">Notifikasi jika stok di bawah jumlah ini</p>
                </div>
                <div class="md:col-span-2">
                    <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Deskripsi</label>
                    <textarea id="description" name="description" rows="2"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">{{if .item}}{{.item.Description}}{{end}}</textarea>
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition">
                    {{if .item}}Simpan Perubahan{{else}}Simpan{{end}}
                </button>
                <a href="/inventory" class="text-sm text-slate-500 hover:text-slate-700 transition">Batal</a>
            </div>
        </form>
    </div>
</div>
